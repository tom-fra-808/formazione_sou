---
- name: Install Apache.
  hosts: all

   tasks:
          - name: Install Apache.
            command: yum install --quiet -y httpd httpd-devel

          - name: Install Apache.
            yum:
              name:
                -httpd
                -httpd-devel
              state: present

          - name: Copy conf files
            copy:
              src: "{{ item.src }}"
              dest: "{{ item.dest }}"
              owner: root
              group: root
              mode: 0644
            with_items:
              - src: httpd.conf
                dest: /etc/httpd/conf/httpd.conf
              - serc: httpd-vhosts.conf
                dest: /etc/httpd/conf/httpd-vhosts.conf 


          - name: Make sure Apache is started now and at boot.
            service:
              name: httpd
              state: started
              enabled: true